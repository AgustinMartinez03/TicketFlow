version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ticketflow-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=TicketFlow123! # ¡Debe coincidir con tu appsettings.json!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data: