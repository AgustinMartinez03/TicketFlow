<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="Assets/favicon.ico">
    <title>TicketFlow - Reserva de Entradas</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="Styles/Paleta.css">
    <link rel="stylesheet" href="Styles/StyleSections/Body.css">
    <link rel="stylesheet" href="Styles/StyleComponents/CardComponent.css">
    
    <link rel="stylesheet" href="Styles/StyleComponents/SeatsComponent.css">

</head>
<body class="bg-dark text-white">
    <nav class="navbar navbar-dark mb-4" style="background-color: #0b0c10;">
        <div class="container">
            <span class="navbar-brand mb-0 h1" style="color: var(--neon-purple);">🎫 TicketFlow</span>
            <span class="navbar-text text-white">Usuario: ID 1 (Agustín)</span>
        </div>
    </nav>

    <main class="container py-5" id="main-content">
        
        <div id="view-catalog">
            <div class="mb-5">
                <p class="text-uppercase tracking-wider mb-1" style="color: var(--neon-purple); font-size: 0.85rem; font-weight: 600;">Descubrir & Reservar</p>
                <h1 class="display-4 fw-bold">Próximos Eventos</h1>
                <p style="color: var(--text-muted);">Encontrá los mejores conciertos y shows cerca tuyo.</p>
            </div>
            <div class="row g-4" id="events-grid">
                <div class="col-12 text-center my-5" id="loading-spinner">
                    <div class="spinner-border" style="color: var(--neon-purple);" role="status"></div>
                </div>
            </div>
        </div>

        <div id="view-sectors" class="d-none">
            <button id="btn-back-catalog" class="btn btn-back mb-4"> <i class="bi bi-arrow-left"> </i> Volver al Catálogo</button>
            <div class="mb-4">
                <p class="text-uppercase tracking-wider mb-1" style="color: var(--neon-purple); font-size: 0.85rem; font-weight: 600;">Paso 2</p>
                <h2 class="display-5 fw-bold">Elegí tu Sector</h2>
            </div>
            <div class="row g-4" id="sectors-grid">
                </div>
        </div>

        <div id="view-seats" class="d-none">
            <button id="btn-back-sectors" class="btn btn-back mb-4"> <i class="bi bi-arrow-left"> </i> Volver a Sectores</button>
            
            <div class="mb-4 text-center">
                <p class="text-uppercase tracking-wider mb-1" style="color: var(--neon-purple); font-size: 0.85rem; font-weight: 600;">Paso 3</p>
                <h2 class="display-5 text-light fw-bold" id="seat-map-title">Seleccioná tu Butaca</h2> <!--a buscar ya que no se ve-->
            </div>

            <div class="mx-auto mt-5 mb-4" style="max-width: 600px;">
                <div class="rounded-pill mx-auto" style="height: 8px; width: 80%; background-color: var(--neon-purple); box-shadow: var(--neon-glow);"></div>
                <p class="mt-2 text-center text-uppercase text-light tracking-wider" style="font-size: 0.75rem; letter-spacing: 0.3em;">Escenario</p>
            </div>

            <div class="d-flex justify-content-center gap-4 mb-5 flex-wrap">
                <div class="d-flex align-items-center gap-2">
                    <div style="width: 15px; height: 15px; background-color: rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.5); border-radius: 4px;"></div>
                    <span class="text-light small">Disponible</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <div style="width: 15px; height: 15px; background-color: rgba(245, 158, 11, 0.2); border: 1px solid rgba(245, 158, 11, 0.5); border-radius: 4px;"></div>
                    <span class="text-light small">Reservada</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <div style="width: 15px; height: 15px; background-color: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;"></div>
                    <span class="text-light small">Vendida</span>
                </div>
            </div>

            <div class="card event-card p-4 mx-auto" style="max-width: 800px;">
                <div id="seats-grid" class="d-flex flex-column gap-2">
                    </div>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="./Js/Controllers/UserPageMain.js"></script>
</body>
</html>
